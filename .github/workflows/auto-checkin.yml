name: Auto Check-In

on:
  schedule:
    - cron: "5 13 * * *"          # UTC 13:05（北京时间 21:05）
  workflow_dispatch:               # 手动触发

env:
  PYTHON_VERSION: "3.14"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # 提前适配 Node.js 24，消除弃用警告
  TZ: Asia/Shanghai                            # 系统时区设为北京时间，Python/bush 自动使用

permissions:
  contents: write          # 允许保活步骤 git push

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行打卡
        env:
          CHECKIN_OPENID: ${{ secrets.CHECKIN_OPENID }}
          CHECKIN_USERNAME: ${{ secrets.CHECKIN_USERNAME }}
          CHECKIN_PASSWORD: ${{ secrets.CHECKIN_PASSWORD }}
          CHECKIN_TASK_ID: ${{ secrets.CHECKIN_TASK_ID }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: bash scripts/auto_checkin.sh

      - name: 保活提交（防止 60 天无活动停用）
        if: always()
        run: |
          python -c "from datetime import datetime,timezone,timedelta;print(datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S'))" > .keepalive
          git config user.name  "Auto Check-In Bot"
          git config user.email "bot@auto-checkin.local"
          git add .keepalive
          KEEPALIVE_DATE=$(python -c "from datetime import datetime,timezone,timedelta;print(datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d'))")
          git diff --cached --quiet || git commit -m "chore: daily keepalive ${KEEPALIVE_DATE} [skip ci]"
          git push || true

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-log
          path: /tmp/auto_checkin_output.txt
          retention-days: 7
